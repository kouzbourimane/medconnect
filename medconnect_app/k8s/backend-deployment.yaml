apiVersion: apps/v1
kind: Deployment
metadata:
  name: medconnect-backend
  labels:
    app: medconnect-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medconnect-backend
  template:
    metadata:
      labels:
        app: medconnect-backend
    spec:
      containers:
      - name: medconnect-backend
        image: imanekouzbour/medconnect-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DEBUG
          value: "True"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: medconnect-secret
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: medconnect-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: medconnect-secret
              key: DB_PASSWORD
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: medconnect-secret
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: medconnect-secret
              key: DB_PORT